included:
  - DictusApp
  - DictusKeyboard
  - DictusCore/Sources
  - DictusWidgets

excluded:
  - build
  - .build
  - Library
  - scripts
  - designs
  - DictusCore/.build
  - DictusKeyboard/Vendored      # vendored giellakbd-ios — keep as-is (see CLAUDE.md)
  - "**/*.generated.swift"

disabled_rules:
  - line_length
  - trailing_whitespace
  - todo
  - identifier_name
  - type_name

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - explicit_init
  - closure_spacing
  - contains_over_first_not_nil
  - redundant_nil_coalescing
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

force_cast: warning
force_try: warning

force_unwrapping:
  severity: warning

cyclomatic_complexity:
  warning: 15
  error: 25

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

reporter: "xcode"
