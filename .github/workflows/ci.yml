name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        env:
          DIFF_BASE: ${{ github.base_ref }}
        with:
          args: lint --reporter github-actions-logging

  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcbeautify (if missing)
        run: |
          if ! command -v xcbeautify >/dev/null 2>&1; then
            brew install xcbeautify
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Dictus.xcodeproj/project.pbxproj', 'DictusCore/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve SwiftPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Dictus.xcodeproj \
            -scheme DictusApp

      - name: Build DictusApp (and embedded Keyboard, Widgets, Core)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Dictus.xcodeproj \
            -scheme DictusApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            | xcbeautify --renderer github-actions

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            build/DerivedData/Logs/Build
          retention-days: 7
          if-no-files-found: ignore
